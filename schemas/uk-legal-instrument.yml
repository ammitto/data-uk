---
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://www.ammitto.org/schemas/uk-legal-instrument.yml
title: UK Legal Instrument
description: Schema for UK legal instruments (regulations, acts, orders)
type: object
required:
  - id
  - title
  - type
properties:
  id:
    type: string
    description: Unique identifier for this legal instrument
    pattern: "^uk/[a-z0-9-]+$"

  title:
    type: string
    description: Title of the legal instrument

  short_title:
    type: string
    description: Short or common name

  url:
    type: string
    format: uri
    description: URL to official source

  type:
    type: string
    description: Type of legal instrument
    enum:
      - act
      - regulation
      - order
      - direction
      - statutory_instrument

  document_id:
    type: string
    description: Official document identifier (e.g., "2019 No. 855")

  publisher:
    type: string
    description: Publisher (links to organizations.yml)

  authority:
    type: string
    description: Issuing authority (links to organizations.yml)

  publish_date:
    type: string
    format: date
    description: Publication date (YYYY-MM-DD)

  effective_date:
    type: string
    format: date
    description: Date when the instrument takes effect

  commencement_date:
    type: string
    format: date
    description: Date when the instrument comes into force

  expiry_date:
    type: string
    format: date
    description: Date when the instrument expires (if applicable)

  lang:
    type: string
    pattern: "^[a-z]{2,3}(-[A-Za-z]{4})?(-[A-Z]{2})?$"
    description: Language code (e.g., "en")
    default: en

  status:
    type: string
    description: Current status of the instrument
    enum:
      - in_force
      - not_in_force
      - revoked
      - amended
      - expired
    default: in_force

  subject:
    type: array
    description: Subject areas
    items:
      type: string

  regime:
    type: string
    description: Sanction regime this instrument relates to

  parent_instrument:
    type: string
    description: ID of parent instrument (for amendments)

  amending_instruments:
    type: array
    description: Instruments that amend this one
    items:
      type: string

  summary:
    type: object
    description: Summary/description in multiple languages
    properties:
      en:
        type: string
        description: English summary

  content:
    type: array
    description: Structured content of the instrument
    items:
      type: object
      properties:
        type:
          type: string
          enum: [part, chapter, section, article, schedule]
        index:
          type: integer
        label:
          type: string
        title:
          type: string
        content:
          type: array
          items:
            type: object

  approval_history:
    type: array
    description: Legislative approval history
    items:
      type: string

  explanatory_notes:
    type: string
    description: Explanatory notes
