other_information: "Alvaro Andres Quijano Becerra was sanctioned by the UN on 28/04/2026
  pursuant to paragraph 3 (c) of resolution 1591 (2005) on the following grounds:
  \n\nAlvaro Andres Quijano Becerra (Quijano) is being designated for engaging in
  actions or policies that threaten the peace, security, or stability of Darfur.\n\nQuijano
  plays a central role in recruiting and deploying former Colombian military personnel
  to Sudan. Video and photographic evidence shows these military personnel providing
  the Rapid Support Forces (RSF) with tactical and technical expertise, serving as
  infantry and artillerymen, drone pilots, vehicle operators, and instructors, with
  some even training children to fight in the RSF.    \n\nThe Colombian fighters have
  participated in numerous battles across Sudan, including in its capital, Khartoum,
  as well as Omdurman, Kordofan, and El Fasher.\n\nQuijano, a former associate of
  the Colombia-based Notre del Valle Cartel, is supported by a network of associates
  and companies that specialize in recruiting fighters and facilitating the movement
  of funds related to their deployment. Quijano co-founded an employment agency, International
  Services Agency (A4SI), that is the main recruiting node, having engaged in campaigns
  via its website, group chats, and townhalls to fill positions, including drone operators,
  snipers, and translators.  Between 350 and 380 Colombian fighters, mostly retired
  soldiers, were recruited through several private security firms, including A4SI.\n\nRelated
  listed individuals and entities: Claudia Vivana Oliveros Forero (SDi.013), Mateo
  Andres Duque Botero (SDi.014).\n\nINTERPOL-UN Security Council Special Notice web
  link:https://www.interpol.int/en/How-wework/Notices/View-UN-Notices-Individuals
  click here"
uk_statement_of_reasons: "\nThe Secretary of State considers that there are reasonable
  grounds to suspect that Alvaro Andres Quijano Becerra is an involved person under
  the Sudan (Sanctions) (EU Exit) Regulations 2020 because he is or has been responsible
  for \naction, policy or activity which threatens the peace, stability and security
  of Sudan, namely through his involvement in enlisting Columbian mercenaries to fight
  alongside the RSF in areas of Sudan, including El Fasher. \n"
