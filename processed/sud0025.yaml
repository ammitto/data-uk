other_information: |-
  Tijani Ibrahim Moussa Mohamed (Al Zeir Salem) was sanctioned by the UN on 24/02/2026 on the following ground:

  Listed pursuant to paragraph 3(c) of UN Security Council Resolution 1591 (2005). As a Lieutenant General and Deputy commander of the RSF,   AL ZEIR SALEM is an individual who impedes the peace process, constitutes a threat to stability in Darfur and the region and has committed violations of international humanitarian or human rights law or other atrocities.
uk_statement_of_reasons: |2

  The Secretary of State considers that there are reasonable grounds to suspect that Tijani Ibrahim Moussa Mohamed (Al Zeir Salem) is an involved person under the Sudan (Sanctions) (EU Exit) Regulations 2020 because he is or has been responsible for, engaging in, providing support for, or promoting the commission of serious violations of international humanitarian law in Sudan, such as the deliberate targeting of civilians in El Fasher.
