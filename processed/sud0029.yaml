other_information: "Mateo Andres Duque Botero was sanctioned by the UN on 28/04/2026
  pursuant to paragraph 3 (c) of resolution 1591 (2005) on the following grounds:
  \n\nMateo Andres Duque Botero (Duque) is being designated for engaging in actions
  or policies that threaten the peace, security, or stability of Darfur.\n\nDuque
  plays a central role in financing former Colombian military personnel in Sudan.
  \ He manages Maine Global Corp, which manages and disburses funds for Global Staffing
  (now Talent Bridge) and the company that hires Colombian military personnel, with
  the support of U.S.-based firms associated with Duque.  This includes processing
  payroll payments for Colombian fighters and serving as a foreign exchange intermediary,
  converting euros and Colombian pesos to U.S. dollars.  In 2024 and 2025, U.S.-based
  firms associated with Duque engaged in numerous wire transfers, totalling millions
  of U.S. dollars, with Maine Global Corp, Global Staffing, and the company hiring
  the Colombian fighters.\n\nVideo and photographic evidence shows these Colombian
  fighters providing the Rapid Support Forces (RSF) with tactical and technical expertise,
  serving as infantry and artillerymen, drone pilots, vehicle operators, and instructors,
  with some even training children to fight in the RSF.    \n\nThe Colombian fighters
  have participated in numerous battles across Sudan, including in its capital, Khartoum,
  as well as Omdurman, Kordofan, and El Fasher.\n\nRelated listed individuals and
  entities: Alvaro Andres Quijano Becerra (SDi.012), Claudia Vivana Oliveros Forero
  (SDi.013).\n\nINTERPOL-UN Security Council Special Notice web link:https://www.interpol.int/en/How-wework/Notices/View-UN-Notices-Individuals
  click here"
uk_statement_of_reasons: |2

  The Secretary of State considers that there are reasonable grounds to suspect that Mateo Andres Duque Botero is an involved person under the Sudan (Sanctions) (EU Exit) Regulations 2020 because he is or has been responsible for action, policy or activity which threatens the peace, stability and security of Sudan namely through his involvement in enlisting Columbian mercenaries to fight alongside the RSF in areas of Sudan, including El Fasher.
