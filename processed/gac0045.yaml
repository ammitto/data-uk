uk_statement_of_reasons: "\nThe Secretary of State considers that there are reasonable
  grounds to suspect that Anna KOSAKOVA is an involved person under the Global Anti-Corruption
  Sanctions Regulations 2021 on the basis that she is or has been involved in serious
  corruption. \nSpecifically, there are reasonable grounds to suspect that KOSAKOVA
  i) has facilitated or provided support for serious corruption, ii) has concealed
  or disguised, or has facilitated the concealment or disguise of, serious corruption,
  iii) transfers or converts, or has transferred or converted, or facilitates the
  transfer or conversion of, any profit or proceeds from serious corruption, and iv)
  has profited or profits financially or obtained or obtains any other benefit from
  serious corruption, given the reasonable grounds to suspect that she receives or
  has received benefit from and has been involved in the improperly diverted, granted,
  or allocated funds originating from the Central Bank of Lebanon whilst Riad Salameh
  was its Governor.\n"
