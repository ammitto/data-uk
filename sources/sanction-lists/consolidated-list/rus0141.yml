            actively for the integration of Crimea into the Russian Federation. On 11 June 2014,
            he resigned from his function as 'First Deputy Prime Minister' of the so-called
            'Republic of Crimea'. Currently General Director of the Managing Company of
            the Russian-Chinese Investment Fund for Regional Development. Remains active
            in supporting separatist actions or policies.

